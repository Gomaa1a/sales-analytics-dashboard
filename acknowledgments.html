<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dabboos — Alert Follow-up</title>
  <link rel="stylesheet" href="assets/css/style.css?v=13" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>" />
</head>
<body>
  <header id="appHeader" class="app"></header>
  <main class="wrap">
    <div class="page-head">
      <h1 id="pgTitle"></h1>
      <p id="pgSub"></p>
    </div>

    <div id="kpis" class="kpi-grid"></div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-head"><h2 id="listTitle"></h2></div>
        <div class="panel-body" style="padding:0">
          <div class="filters" style="padding:12px 16px 0" id="filters"></div>
          <div class="filters" style="padding:0 16px" id="fbHost"></div>
          <div id="ackTable"></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2 id="notesTitle"></h2></div>
        <div class="panel-body" style="padding:0"><div id="notesFeed"></div></div>
      </div>
    </div>
    <div class="foot">Dabboos Sales Command Center · Odoo → n8n → Supabase</div>
  </main>

  <script src="assets/js/config.js?v=13"></script>
  <script src="assets/js/common.js?v=13"></script>
  <script src="assets/js/order-modal.js?v=13"></script>
  <script>
  (function () {
    const D = window.DASH;
    D.buildChrome("acks");
    document.getElementById("pgTitle").textContent = D.t("acks_title");
    document.getElementById("pgSub").textContent = D.t("acks_sub");
    document.getElementById("listTitle").textContent = D.t("alerts_title");
    document.getElementById("notesTitle").textContent = D.t("ack_notes");

    let alerts = [], ackMap = {}, acksAll = [], filter = "all";

    const kpi = (cls, label, num, sub) =>
      `<div class="kpi ${cls}"><div class="kpi-l">${label}</div><div class="kpi-n">${num}</div><div class="kpi-sub">${sub || "&nbsp;"}</div></div>`;

    document.getElementById("filters").innerHTML = `
      <span class="pill active" data-f="all">${D.t("filter_all")}</span>
      <span class="pill" data-f="ignored">${D.t("filter_ignored")}</span>
      <span class="pill" data-f="seen">${D.t("filter_seen")}</span>`;
    document.querySelectorAll(".pill").forEach(p => p.addEventListener("click", () => {
      filter = p.getAttribute("data-f");
      document.querySelectorAll(".pill").forEach(x => x.classList.toggle("active", x === p));
      renderTable();
    }));
    const fb = D.filterBar(document.getElementById("fbHost"), { date: true, rep: true, customer: true }, renderTable);

    function renderKpis(rows) {
      const total = rows.length;
      const seen = rows.filter(a => ackMap[a.order_id]).length;
      const ignored = total - seen;
      const rate = total ? Math.round(seen / total * 100) : 0;
      document.getElementById("kpis").innerHTML =
        kpi("", D.t("ack_total"), D.fmtNum(total), "&nbsp;") +
        kpi("k-grn", D.t("ack_seen"), D.fmtNum(seen), "&nbsp;") +
        kpi("k-red", D.t("ack_ignored"), D.fmtNum(ignored), "&nbsp;") +
        kpi("k-vio", D.t("ack_rate"), rate + "%", "&nbsp;");
    }

    function renderTable() {
      // Base set respects the filter bar (date / rep / customer) — KPIs and notes follow this.
      const base = alerts.filter(a => fb.match(a, { date: "date_order", rep: "salesperson", cust: "partner_name" }));
      renderKpis(base);
      renderNotes(base);
      // Table additionally applies the seen/ignored pill filter.
      const rows = base.filter(a => {
        const seen = !!ackMap[a.order_id];
        if (filter !== "all" && (filter === "seen" ? !seen : seen)) return false;
        return true;
      });
      fb.setCount(rows.length);
      document.getElementById("ackTable").innerHTML = rows.length ? `
        <table class="dt">
          <thead><tr>
            <th>${D.t("col_order")}</th><th>${D.t("col_customer")}</th>
            <th>${D.t("ack_status")}</th><th>${D.t("ack_reviews")}</th><th>${D.t("ack_when")}</th>
          </tr></thead>
          <tbody>
          ${rows.map(a => {
            const acks = ackMap[a.order_id] || [];
            const seen = acks.length > 0;
            const last = seen ? acks[0].created_at : null;
            return `<tr>
              <td><a class="order-link" data-order-id="${a.order_id}">${a.order_name || ("#" + a.order_id)}</a>
                  <div>${a.level === "critical" ? `<span class="badge b-crit">${D.t("critical")}</span>` : `<span class="badge b-warn">${D.t("warning")}</span>`}</div></td>
              <td>${a.partner_name}</td>
              <td>${seen ? `<span class="badge b-ok">${D.t("st_seen")}</span>` : `<span class="badge b-warn">${D.t("st_ignored")}</span>`}</td>
              <td>${seen ? D.fmtNum(acks.length) : "—"}</td>
              <td class="muted">${last ? (D.fmtDate(last) + " · " + D.fmtTime(last)) : "—"}</td>
            </tr>`;
          }).join("")}
          </tbody>
        </table>` : `<div class="empty">—</div>`;
    }

    function renderNotes(base) {
      const v = fb.values();
      const filtered = !!(v.from || v.to || v.rep || v.cust);
      let notes = acksAll.filter(a => a.note && a.note.trim());
      // When a filter is active, only keep notes for orders in the filtered set;
      // with no filter, leave the original full notes list.
      if (filtered) {
        const allowed = new Set((base || []).map(a => a.order_id));
        notes = notes.filter(a => allowed.has(a.order_id));
      }
      const withNotes = notes;
      document.getElementById("notesFeed").innerHTML = withNotes.length ? `
        <div class="notes-list">
        ${withNotes.slice(0, 50).map(a => `
          <div class="note-item">
            <div class="note-head">
              <a class="order-link" data-order-id="${a.order_id}">${a.order_name || ("#" + a.order_id)}</a>
              <span class="muted">${D.fmtDate(a.created_at)} · ${D.fmtTime(a.created_at)}</span>
            </div>
            <div class="note-body">${a.note}</div>
          </div>`).join("")}
        </div>` : `<div class="empty">${D.t("no_notes")}</div>`;
    }

    async function tick() {
      try {
        const [al, ak] = await Promise.all([D.api("alerts"), D.api("acks")]);
        D.setUpdated(al.generated_at);
        alerts = al.alerts || [];
        acksAll = ak.acks || [];
        ackMap = {};
        acksAll.forEach(r => { (ackMap[r.order_id] = ackMap[r.order_id] || []).push(r); });
        fb.setReps(alerts.map(a => a.salesperson));

        renderTable();
      } catch (e) {
        document.getElementById("ackTable").innerHTML = `<div class="err">${D.t("error_load")}</div>`;
      }
    }
    tick();
    setInterval(tick, D.cfg.POLL_MS);
  })();
  </script>
</body>
</html>
