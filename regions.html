<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dabboos — Cities & Governorates</title>
  <link rel="stylesheet" href="assets/css/style.css?v=59" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f1729" />
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>" />
</head>
<body>
  <header id="appHeader" class="app"></header>
  <main class="wrap">
    <div class="page-head">
      <h1 id="pgTitle"></h1>
      <p id="pgSub"></p>
    </div>

    <p id="basisNote" class="muted" style="margin:-4px 2px 10px;font-size:12px;line-height:1.6"></p>
    <div id="unmappedBanner" style="display:none"></div>

    <div class="filters">
      <label class="fb-field"><span id="fromLbl"></span><input id="fFrom" class="fb-date" type="date"></label>
      <label class="fb-field"><span id="toLbl"></span><input id="fTo" class="fb-date" type="date"></label>
      <select id="govSel" class="fb-sel"></select>
      <input id="q" class="search-box" type="search">
      <button id="clr" class="fb-clear" type="button"></button>
      <span id="cnt" class="fb-count"></span>
    </div>

    <div class="grid-2" data-src="dashboard_orders dashboard_customers">
      <div class="panel">
        <div class="panel-head"><h2 id="govChTitle"></h2></div>
        <div class="panel-body"><div class="chart-box tall"><canvas id="govChart"></canvas></div></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2 id="govTblTitle"></h2></div>
        <div class="panel-body" style="padding:0"><div id="govTable"></div></div>
      </div>
    </div>

    <div class="panel" data-src="dashboard_orders dashboard_customers">
      <div class="panel-head"><h2 id="cityTblTitle"></h2></div>
      <div class="panel-body cap" style="padding:0"><div id="cityTable"></div></div>
    </div>

    <div class="foot">Dabboos Sales Command Center · n8n + Odoo</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="assets/js/config.js?v=59"></script>
  <script src="assets/js/auth.js?v=59"></script>
  <script src="assets/js/common.js?v=59"></script>
  <script>
  (function () {
    const D = window.DASH;
    D.buildChrome("regions");
    document.getElementById("pgTitle").textContent = D.t("regions_title");
    document.getElementById("pgSub").textContent = D.t("regions_sub");
    document.getElementById("govChTitle").textContent = D.t("govs_title");
    document.getElementById("govTblTitle").textContent = D.t("govs_title");
    document.getElementById("cityTblTitle").textContent = D.t("cities_title");
    document.getElementById("fromLbl").textContent = D.t("f_from");
    document.getElementById("toLbl").textContent = D.t("f_to");
    document.getElementById("q").placeholder = D.t("search_ph");
    document.getElementById("clr").textContent = D.t("f_clear");
    document.getElementById("basisNote").textContent = D.t("region_basis");

    const PALETTE = ["#2563eb","#7c3aed","#16a34a","#d97706","#dc2626","#0891b2","#db2777","#65a30d","#9333ea","#0d9488","#ea580c","#4f46e5"];
    const isConf = o => o.state === "sale" || o.state === "done";
    const val = o => Number(o.amount_total) || 0;

    let chart = null;
    let cityRows = [];            // [{city, govKey, govLabel, orders, value}]
    let loadedFrom = null, loadedTo = null;

    const bag = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Baghdad" }));
    const pad = n => String(n).padStart(2, "0");
    const ymd = d => d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
    const today = ymd(bag);
    const from30 = ymd(new Date(bag.getTime() - 29 * 864e5));

    const $ = id => document.getElementById(id);
    $("fFrom").value = from30; $("fTo").value = today;
    ["fFrom", "fTo"].forEach(id => $(id).addEventListener("input", onDate));
    $("govSel").addEventListener("input", render);
    $("q").addEventListener("input", render);
    $("clr").addEventListener("click", () => { $("q").value = ""; $("govSel").value = ""; render(); });

    async function onDate() {
      const from = $("fFrom").value || from30, to = $("fTo").value || today;
      await loadWindow(from, to);
      render();
    }

    async function loadWindow(from, to) {
      try {
        // ODOO-EXACT mode (owner decision 2026-07-18): governorate = the
        // customer's State string VERBATIM (incl. "(IQ)"), city = the City
        // field verbatim, empty = the same "None" bucket Odoo shows. No
        // dictionary, no merging — this page must read like Odoo's own
        // State grouping, label for label, so anyone can compare 1:1.
        const rows = await D.loadOrders({ from, to, dateField: "date_order",
          select: "order_id,city,state,amount_total,create_date,date_order,dashboard_customers(governorate,city)" });
        loadedFrom = from; loadedTo = to;
        const NONE = D.t("gov_none");
        const m = {};
        rows.filter(isConf).forEach(o => {
          const mc = o.dashboard_customers || {};
          const gov = (mc.governorate && String(mc.governorate).trim()) || NONE;
          const city = (mc.city && String(mc.city).trim()) ||
            ((o.city && o.city !== "—") ? String(o.city).trim() : NONE);
          const key = gov + "||" + city;
          if (!m[key]) m[key] = { city, govKey: gov, govLabel: gov, orders: 0, value: 0 };
          m[key].orders++; m[key].value += val(o);
        });
        cityRows = Object.values(m);
        D.setUpdated(new Date().toISOString());
      } catch (e) { cityRows = []; $("cityTable").innerHTML = `<div class="err">${D.t("error_load")}</div>`; }
    }

    function fillGovSelect() {
      // governorate options ordered by value (computed over ALL cities, unfiltered by search)
      const g = {};
      cityRows.forEach(r => { if (!g[r.govKey]) g[r.govKey] = { key: r.govKey, label: r.govLabel, value: 0 }; g[r.govKey].value += r.value; });
      const list = Object.values(g).sort((a, b) => b.value - a.value);
      const sel = $("govSel"); const cur = sel.value;
      sel.innerHTML = `<option value="">${D.t("gov_all")}</option>` +
        list.map(x => `<option value="${D.esc(x.key)}"${x.key === cur ? " selected" : ""}>${D.esc(x.label)}</option>`).join("");
    }

    function render() {
      const selGov = $("govSel").value;
      const q = $("q").value.trim().toLowerCase();

      const cities = cityRows.filter(r =>
        (!selGov || r.govKey === selGov) &&
        (!q || r.city.toLowerCase().includes(q) || r.govLabel.toLowerCase().includes(q)));

      // governorates derived from the filtered cities (hierarchical: govs first)
      const gmap = {};
      cities.forEach(r => { if (!gmap[r.govKey]) gmap[r.govKey] = { key: r.govKey, label: r.govLabel, orders: 0, value: 0, cities: 0 }; const e = gmap[r.govKey]; e.orders += r.orders; e.value += r.value; e.cities++; });
      const govs = Object.values(gmap).sort((a, b) => b.value - a.value);
      const totalVal = govs.reduce((s, x) => s + x.value, 0) || 1;
      $("cnt").textContent = `${D.fmtNum(govs.length)} ${D.t("govs_title")} · ${D.fmtNum(cities.length)} ${D.t("cities_title")}`;

      // Surface Odoo's "None" bucket (customers with an empty State field) —
      // the same row Odoo's pivot shows, with the same fix: fill the field.
      const noc = gmap[D.t("gov_none")];
      const banner = $("unmappedBanner");
      if (noc && noc.value > 0) {
        const pct = Math.round(noc.value / totalVal * 100);
        banner.innerHTML = `<div class="err" style="background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:10px;padding:10px 14px;margin:0 2px 12px;font-size:13px">` +
          `⚠️ <b>${D.t("gov_none")}:</b> ${D.fmtNum(noc.orders)} ${D.t("orders")} · ${D.fmtMoney(noc.value)} (${pct}%). ${D.t("gov_none_note")}</div>`;
        banner.style.display = "";
      } else { banner.style.display = "none"; banner.innerHTML = ""; }

      // governorate chart
      const ctx = $("govChart");
      if (chart) chart.destroy();
      chart = new Chart(ctx, {
        type: "bar",
        data: { labels: govs.map(x => x.label), datasets: [{ label: D.t("kpi_value"),
          data: govs.map(x => x.value), backgroundColor: govs.map((_, i) => PALETTE[i % PALETTE.length]), borderRadius: 6 }] },
        options: { indexAxis: "y", maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: {
            label: c => `${D.fmtMoneyFull(c.parsed.x)} · ${D.fmtNum(govs[c.dataIndex].orders)} ${D.t("orders")}` } } },
          scales: { x: { beginAtZero: true, ticks: { callback: v => D.fmtMoney(v) } } } }
      });

      // governorate table (click a row to drill into its cities)
      $("govTable").innerHTML = govs.length ? `
        <table class="dt">
          <thead><tr><th>${D.t("col_gov")}</th><th>${D.t("cities_count")}</th><th>${D.t("orders")}</th><th>${D.t("col_amount")}</th><th>${D.t("share")}</th></tr></thead>
          <tbody>
          ${govs.map(x => `<tr class="gov-row" data-gov="${D.esc(x.key)}" style="cursor:pointer">
            <td class="strong">${x.key === D.t("gov_none")
              ? `<span title="${D.esc(D.t("gov_none_note"))}" style="color:#92400e;background:#fef3c7;padding:2px 8px;border-radius:999px">⚠️ ${D.esc(x.label)}</span>`
              : D.esc(x.label)}</td>
            <td>${D.fmtNum(x.cities)}</td>
            <td>${D.fmtNum(x.orders)}</td>
            <td class="amt">${D.fmtMoney(x.value)}</td>
            <td class="muted">${Math.round(x.value / totalVal * 100)}%</td>
          </tr>`).join("")}
          </tbody>
        </table>` : `<div class="empty">${D.t("no_data")}</div>`;
      [...document.querySelectorAll(".gov-row")].forEach(tr => tr.addEventListener("click", () => { $("govSel").value = tr.dataset.gov; render(); }));

      // cities table (respects the selected governorate + search)
      const cityList = [...cities].sort((a, b) => b.value - a.value).slice(0, 300);
      $("cityTable").innerHTML = cityList.length ? `
        <table class="dt">
          <thead><tr><th>${D.t("region")}</th><th>${D.t("col_gov")}</th><th>${D.t("orders")}</th><th>${D.t("col_amount")}</th><th>${D.t("share")}</th></tr></thead>
          <tbody>
          ${cityList.map(r => `<tr>
            <td class="strong">${D.esc(r.city)}</td>
            <td class="muted">${r.govKey === D.t("gov_none")
              ? `<span title="${D.esc(D.t("gov_none_note"))}" style="color:#92400e;background:#fef3c7;padding:2px 8px;border-radius:999px;font-size:11.5px">⚠️ ${D.esc(r.govLabel)}</span>`
              : D.esc(r.govLabel)}</td>
            <td>${D.fmtNum(r.orders)}</td>
            <td class="amt">${D.fmtMoney(r.value)}</td>
            <td class="muted">${Math.round(r.value / totalVal * 100)}%</td>
          </tr>`).join("")}
          </tbody>
        </table>` : `<div class="empty">${D.t("no_data")}</div>`;
    }

    (async function init() { await loadWindow(from30, today); fillGovSelect(); render(); })();
    setInterval(async () => { await loadWindow(loadedFrom || from30, loadedTo || today); fillGovSelect(); render(); }, D.cfg.POLL_MS * 5);
  })();
  </script>
</body>
</html>
