<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dabboos — Sales Command Center</title>
  <link rel="stylesheet" href="assets/css/style.css?v=20" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
</head>
<body>
  <header id="appHeader" class="app"></header>
  <main class="wrap">
    <div class="page-head">
      <h1 id="pgTitle"></h1>
      <p id="pgSub"></p>
    </div>

    <div class="filters" id="fbHost"></div>

    <!-- Executive summary band (merged into the overview) -->
    <section class="exec">
      <div class="exec-heads" id="execHeads"></div>
      <div class="exec-mini" id="execMini"></div>
      <div class="exec-foot">
        <div class="exec-story">
          <div class="ex-l" id="storyLbl"></div>
          <p id="storyText"></p>
        </div>
        <div class="exec-var">
          <div class="ex-l" id="varLbl"></div>
          <div class="exec-n" id="varNum">—</div>
          <div class="ex-sub" id="varSub"></div>
        </div>
      </div>
    </section>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-head"><h2 id="dayTitle"></h2></div>
        <div class="panel-body"><div class="chart-box"><canvas id="dayChart"></canvas></div></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2 id="statusTitle"></h2></div>
        <div class="panel-body"><div class="chart-box"><canvas id="statusChart"></canvas></div></div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-head"><h2 id="custTitle"></h2></div>
        <div class="panel-body"><div class="chart-box"><canvas id="custChart"></canvas></div></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2 id="govTitle"></h2></div>
        <div class="panel-body"><div class="chart-box"><canvas id="govChart"></canvas></div></div>
      </div>
    </div>

    <div class="foot">Dabboos Sales Command Center · Odoo → n8n → Supabase</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="assets/js/config.js?v=20"></script>
  <script src="assets/js/common.js?v=20"></script>
  <script>
  (function () {
    const D = window.DASH;
    D.buildChrome("overview");
    document.getElementById("pgTitle").textContent = D.t("brand");
    document.getElementById("pgSub").textContent = D.t("ov_sub");
    document.getElementById("dayTitle").textContent = D.t("ov_orders_day");
    document.getElementById("statusTitle").textContent = D.t("ov_status_mix");
    document.getElementById("custTitle").textContent = D.t("top_customers");
    document.getElementById("govTitle").textContent = D.t("ov_top_govs");
    document.getElementById("storyLbl").textContent = D.t("ex_story");
    document.getElementById("varLbl").textContent = D.t("ex_var");

    const isConf = o => o.state === "sale" || o.state === "done";
    const isQuote = o => o.state === "draft" || o.state === "sent";
    const val = o => Number(o.amount_total) || 0;
    const num = n => Number(n) || 0;
    const dayOf = o => String(o.create_date || o.date_order || "").slice(0, 10);
    const inMonth = (o, ym) => dayOf(o).slice(0, 7) === ym;
    const TARGETS = (D.cfg.TARGETS || {});
    const TARGET = num(TARGETS.MONTHLY_REVENUE_TARGET);

    let dayChart = null, statusChart = null, custChart = null, govChart = null;
    let allRows = [], payments = [], debtRows = [], alerts = [];
    let loadedFrom = null, loadedTo = null;

    // Baghdad calendar anchors
    const bag = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Baghdad" }));
    const pad = n => String(n).padStart(2, "0");
    const ymd = d => d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
    const today = ymd(bag);
    const thisMonth = today.slice(0, 7);
    const monthStart = thisMonth + "-01";
    const lastMonth = ymd(new Date(bag.getFullYear(), bag.getMonth() - 1, 1)).slice(0, 7);
    const lastMonthStart = lastMonth + "-01";
    const daysInMonth = new Date(bag.getFullYear(), bag.getMonth() + 1, 0).getDate();
    const dayOfMonth = bag.getDate();

    const fb = D.filterBar(document.getElementById("fbHost"), { date: true, rep: true, customer: true }, onFilterChange);
    document.getElementById("fbFrom").value = monthStart;
    document.getElementById("fbTo").value = today;

    async function onFilterChange() {
      const v = fb.values();
      const from = v.from || monthStart, to = v.to || today;
      // window must cover the chosen range AND last-month..today (for MoM + the month-anchored band)
      const wFrom = [from, lastMonthStart].sort()[0];
      const wTo = to > today ? to : today;
      if (wFrom !== loadedFrom || wTo !== loadedTo) await loadWindow(wFrom, wTo);
      render();
    }

    async function loadWindow(from, to) {
      try {
        [allRows, payments] = await Promise.all([
          D.loadOrders({ from, to, dateField: "create_date",
            select: "order_id,order_name,partner_name,salesperson,user_id,city,state,amount_total,create_date,date_order" }),
          D.loadPayments({ from, to })
        ]);
        loadedFrom = from; loadedTo = to;
        fb.setReps(allRows.map(o => o.salesperson));
        D.setUpdated(new Date().toISOString());
      } catch (e) { allRows = []; payments = []; document.getElementById("execHeads").innerHTML = `<div class="err">${D.t("error_load")}</div>`; }
    }

    async function loadSnapshots() {
      // live overdue (rep_debt) + value-at-risk (alerts) — not date-windowed
      try {
        const snap = await D.api("rep_debt");
        debtRows = [];
        (snap.reps || []).forEach(r => (r.customers || []).forEach(c =>
          debtRows.push({ name: c.name, receivable: num(c.receivable), overdue: num(c.overdue), salesperson: r.salesperson })));
      } catch (e) { debtRows = []; }
      try { const a = await D.api("alerts"); alerts = a.alerts || []; } catch (e) { alerts = []; }
    }

    const card = (lbl, n, extra) =>
      `<div class="exec-card"><div class="ex-l">${lbl}</div><div class="exec-row"><div class="exec-n">${n}</div>${extra || ""}</div>`;
    const mini = (lbl, v, d) =>
      `<div class="ex-mini"><div class="ex-l">${lbl}</div><div class="ex-v">${v}</div><div class="ex-d">${d || "&nbsp;"}</div></div>`;
    const deltaTag = pct => `<span class="exec-delta ${pct >= 0 ? "up" : "down"}">${pct >= 0 ? "▲" : "▼"} ${Math.abs(pct)}%</span>`;
    const pctOf = (a, b) => b > 0 ? Math.round((a - b) / b * 100) : (a > 0 ? 100 : 0);

    function render() {
      const v = fb.values();
      const from = v.from || monthStart, to = v.to || today;
      // rep + customer narrowing applies to everything ("search changes all data")
      const matchRC = o => fb.match(o, { rep: "salesperson", cust: "partner_name" });

      // ----- filter-range slice (drives the secondary stats + charts) -----
      const rangeRows = allRows.filter(o => { const d = dayOf(o); return d >= from && d <= to && matchRC(o); });
      const rConf = rangeRows.filter(isConf), rQuotes = rangeRows.filter(isQuote);
      const rConfVal = rConf.reduce((s, o) => s + val(o), 0);
      const aov = rConf.length ? Math.round(rConfVal / rConf.length) : 0;
      const convPct = (rConf.length + rQuotes.length) ? Math.round(rConf.length / (rConf.length + rQuotes.length) * 100) : 0;
      const customers = new Set(rConf.map(o => o.partner_name).filter(Boolean)).size;
      fb.setCount(rangeRows.length);

      // ----- month-anchored slice (drives the hero band) -----
      const confAll = allRows.filter(o => isConf(o) && matchRC(o));
      const revMonth = confAll.filter(o => inMonth(o, thisMonth)).reduce((s, o) => s + val(o), 0);
      const revLast = confAll.filter(o => inMonth(o, lastMonth)).reduce((s, o) => s + val(o), 0);
      const momRev = pctOf(revMonth, revLast);
      const attain = TARGET > 0 ? Math.round(revMonth / TARGET * 100) : null;
      const pace = dayOfMonth > 0 ? Math.round(revMonth / dayOfMonth * daysInMonth) : revMonth;
      const paceVs = TARGET > 0 ? Math.round(pace / TARGET * 100) : null;

      const paysRC = payments.filter(p => fb.match(p, { rep: "salesperson", cust: "partner_name" }));
      const cashMonth = paysRC.filter(p => String(p.date).slice(0, 7) === thisMonth).reduce((s, p) => s + num(p.amount), 0);
      const vsSales = revMonth > 0 ? Math.round(cashMonth / revMonth * 100) : null;

      // overdue / receivable (respect rep + customer filter)
      const debtRC = debtRows.filter(r => (!v.rep || r.salesperson === v.rep) && (!v.cust || String(r.name || "").toLowerCase().includes(v.cust)));
      const receivable = debtRC.reduce((s, r) => s + r.receivable, 0);
      const overdue = debtRC.reduce((s, r) => s + r.overdue, 0);
      const top10 = [...debtRC].sort((a, b) => b.overdue - a.overdue).slice(0, 10).reduce((s, r) => s + r.overdue, 0);
      const conc = overdue > 0 ? Math.round(top10 / overdue * 100) : 0;
      const dso = (receivable > 0 && revMonth > 0) ? Math.round(receivable / revMonth * 30) : null;

      // ----- hero cards -----
      const barCls = paceVs == null ? "" : (paceVs >= 100 ? "" : (paceVs >= 80 ? "warn" : "bad"));
      const targetBlock = TARGET > 0
        ? `<div class="ex-bar ${barCls}"><i style="width:${Math.min(attain, 100)}%"></i></div>
           <div class="ex-sub"><b>${attain}%</b> ${D.t("ex_of_target")} (${D.fmtMoney(TARGET)}) · ${D.t("ex_pace")} <b>${D.fmtMoney(pace)}</b> (${paceVs}%)</div>`
        : `<div class="ex-sub" style="margin-top:8px">${D.fmtNum(confAll.filter(o => inMonth(o, thisMonth)).length)} ${D.t("orders")}</div>`;

      document.getElementById("execHeads").innerHTML =
        card(D.t("ex_revenue"), D.fmtMoney(revMonth), revLast > 0 ? deltaTag(momRev) : "") + targetBlock + `</div>` +
        card(D.t("ex_cash"), D.fmtMoney(cashMonth), "") +
          `<div class="ex-sub" style="margin-top:9px">${D.t("coll_vs_sales")}: <b>${vsSales != null ? vsSales + "%" : "—"}</b>` +
          `${dso != null ? ` · ${D.t("ex_dso")}: <b>${dso}</b>` : ""}</div></div>` +
        `<div class="exec-card"><div class="ex-l">${D.t("ex_overdue")}</div><div class="exec-row"><div class="exec-n" style="color:var(--red)">${D.fmtMoney(overdue)}</div></div>` +
          `<div class="ex-sub" style="margin-top:9px">${D.t("ex_conc_sub")}: <b>${conc}%</b></div></div>`;

      // ----- secondary mini stats (filter-range) -----
      const repAgg = {}; rConf.forEach(o => { const n = o.salesperson || "—"; repAgg[n] = (repAgg[n] || 0) + val(o); });
      const topRep = Object.entries(repAgg).sort((a, b) => b[1] - a[1])[0];
      const govAgg = {}; let govTotal = 0; rConf.forEach(o => { const g = D.govLabel(D.govOf(o.city).key); govAgg[g] = (govAgg[g] || 0) + val(o); govTotal += val(o); });
      const topGov = Object.entries(govAgg).sort((a, b) => b[1] - a[1])[0];
      const govShare = (topGov && govTotal > 0) ? Math.round(topGov[1] / govTotal * 100) : 0;

      document.getElementById("execMini").innerHTML =
        mini(D.t("conversion"), convPct + "%", `${D.fmtNum(rConf.length)} ${D.t("ov_confirmed")} · ${D.fmtNum(rQuotes.length)} ${D.t("kpi_quotes")}`) +
        mini(D.t("kpi_avg"), D.fmtMoney(aov), `${D.fmtNum(customers)} ${D.t("ov_customers")}`) +
        mini(D.t("ex_top_rep"), topRep ? topRep[0] : "—", topRep ? D.fmtMoney(topRep[1]) : "&nbsp;") +
        mini(D.t("ex_top_gov"), topGov ? topGov[0] : "—", topGov ? `${govShare}% ${D.t("share")}` : "&nbsp;");

      // ----- value at risk (critical alerts) -----
      const crit = alerts.filter(a => a.level === "critical");
      const var$ = crit.reduce((s, a) => s + num(a.amount_total), 0);
      document.getElementById("varNum").textContent = D.fmtMoney(var$);
      document.getElementById("varSub").innerHTML = `${D.fmtNum(crit.length)} ${D.t("ex_var_sub")}`;

      // ----- narrative -----
      document.getElementById("storyText").innerHTML = buildStory({ revMonth, momRev, hasLast: revLast > 0, attain, pace, vsSales, overdue, conc, topGov, govShare });

      // ----- charts (filter-range) -----
      drawByDay(rConf);
      drawStatus(rangeRows);
      drawTopCustomers(rConf);
      drawTopGovs(rConf);
    }

    function buildStory(x) {
      const m = D.fmtMoney;
      const dir = p => p >= 0 ? "▲" : "▼";
      if (D.isAR()) {
        let s = `المبيعات المؤكدة هذا الشهر <b>${m(x.revMonth)}</b>`;
        if (x.hasLast) s += ` (${dir(x.momRev)} ${Math.abs(x.momRev)}% عن الشهر الماضي)`;
        if (x.attain != null) s += `، أي <b>${x.attain}%</b> من الهدف، والمتوقّع <b>${m(x.pace)}</b> بنهاية الشهر`;
        if (x.vsSales != null) s += `. التحصيل <b>${x.vsSales}%</b> من المبيعات`;
        if (x.overdue > 0) s += `، والمتأخرات <b>${m(x.overdue)}</b> يتركّز <b>${x.conc}%</b> منها في أكبر ١٠ عملاء`;
        if (x.topGov) s += `. أعلى محافظة: <b>${x.topGov[0]}</b> (${x.govShare}%)`;
        return s + ".";
      }
      let s = `Confirmed sales this month are <b>${m(x.revMonth)}</b>`;
      if (x.hasLast) s += ` (${dir(x.momRev)} ${Math.abs(x.momRev)}% vs last month)`;
      if (x.attain != null) s += `, i.e. <b>${x.attain}%</b> of target, on pace for <b>${m(x.pace)}</b> by month-end`;
      if (x.vsSales != null) s += `. Cash collected is <b>${x.vsSales}%</b> of sales`;
      if (x.overdue > 0) s += `, and overdue of <b>${m(x.overdue)}</b> is <b>${x.conc}%</b> concentrated in the top 10 customers`;
      if (x.topGov) s += `. Top governorate: <b>${x.topGov[0]}</b> (${x.govShare}%)`;
      return s + ".";
    }

    function drawByDay(conf) {
      const m = {};
      conf.forEach(o => { const d = dayOf(o); if (!d) return; if (!m[d]) m[d] = { orders: 0, value: 0 }; m[d].orders++; m[d].value += val(o); });
      const days = Object.keys(m).sort();
      const ctx = document.getElementById("dayChart");
      if (dayChart) dayChart.destroy();
      dayChart = new Chart(ctx, {
        type: "bar",
        data: { labels: days.map(d => d.slice(8, 10) + "/" + d.slice(5, 7)), datasets: [{
          label: D.t("orders_count"), data: days.map(d => m[d].orders),
          backgroundColor: "#2563eb", borderRadius: 5, maxBarThickness: 34 }] },
        options: { maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: {
            label: c => `${D.fmtNum(c.parsed.y)} ${D.t("orders")} · ${D.fmtMoney(m[days[c.dataIndex]].value)}` } } },
          scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }
      });
    }

    function drawStatus(rows) {
      const order = ["draft", "sent", "sale", "done", "cancel"];
      const color = { draft: "#94a3b8", sent: "#60a5fa", sale: "#16a34a", done: "#0891b2", cancel: "#dc2626" };
      const counts = {}; order.forEach(s => counts[s] = 0);
      rows.forEach(o => { if (counts[o.state] != null) counts[o.state]++; });
      const present = order.filter(s => counts[s] > 0);
      const ctx = document.getElementById("statusChart");
      if (statusChart) statusChart.destroy();
      statusChart = new Chart(ctx, {
        type: "doughnut",
        data: { labels: present.map(s => D.stateLabel(s)), datasets: [{
          data: present.map(s => counts[s]), backgroundColor: present.map(s => color[s]), borderWidth: 2 }] },
        options: { maintainAspectRatio: false, cutout: "55%",
          plugins: { legend: { position: "bottom" }, tooltip: { callbacks: {
            label: c => `${c.label}: ${D.fmtNum(c.parsed)} ${D.t("orders")}` } } } }
      });
    }

    function drawTopCustomers(conf) {
      const m = {};
      conf.forEach(o => { const n = o.partner_name || "—"; if (!m[n]) m[n] = { orders: 0, value: 0 }; m[n].orders++; m[n].value += val(o); });
      const top = Object.entries(m).map(([name, x]) => ({ name, ...x })).sort((a, b) => b.value - a.value).slice(0, 8);
      const ctx = document.getElementById("custChart");
      if (custChart) custChart.destroy();
      custChart = new Chart(ctx, {
        type: "bar",
        data: { labels: top.map(x => x.name), datasets: [{
          label: D.t("kpi_value"), data: top.map(x => x.value), backgroundColor: "#0ea5e9", borderRadius: 5, maxBarThickness: 20 }] },
        options: { maintainAspectRatio: false, indexAxis: "y",
          plugins: { legend: { display: false }, tooltip: { callbacks: {
            label: c => `${D.fmtMoneyFull(c.parsed.x)} · ${D.fmtNum(top[c.dataIndex].orders)} ${D.t("orders")}` } } },
          scales: { x: { beginAtZero: true, ticks: { callback: v => D.fmtMoney(v) } } } }
      });
    }

    function drawTopGovs(conf) {
      const m = {};
      conf.forEach(o => { const g = D.govOf(o.city); if (!m[g.key]) m[g.key] = { label: D.govLabel(g.key), orders: 0, value: 0 }; m[g.key].orders++; m[g.key].value += val(o); });
      const top = Object.values(m).sort((a, b) => b.value - a.value).slice(0, 10);
      const PAL = ["#2563eb","#7c3aed","#16a34a","#d97706","#dc2626","#0891b2","#db2777","#65a30d","#9333ea","#0d9488"];
      const ctx = document.getElementById("govChart");
      if (govChart) govChart.destroy();
      govChart = new Chart(ctx, {
        type: "bar",
        data: { labels: top.map(x => x.label), datasets: [{
          label: D.t("kpi_value"), data: top.map(x => x.value), backgroundColor: top.map((_, i) => PAL[i % PAL.length]), borderRadius: 5, maxBarThickness: 24 }] },
        options: { maintainAspectRatio: false, indexAxis: "y",
          plugins: { legend: { display: false }, tooltip: { callbacks: {
            label: c => `${D.fmtMoneyFull(c.parsed.x)} · ${D.fmtNum(top[c.dataIndex].orders)} ${D.t("orders")}` } } },
          scales: { x: { beginAtZero: true, ticks: { callback: v => D.fmtMoney(v) } } } }
      });
    }

    (async function init() {
      await Promise.all([loadWindow(lastMonthStart, today), loadSnapshots()]);
      render();
    })();
    setInterval(async () => {
      await Promise.all([loadWindow(loadedFrom || lastMonthStart, loadedTo || today), loadSnapshots()]);
      render();
    }, D.cfg.POLL_MS);
  })();
  </script>
</body>
</html>
