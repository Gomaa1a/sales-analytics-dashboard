<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dabboos — Alert Center</title>
  <link rel="stylesheet" href="assets/css/style.css?v=13" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚨</text></svg>" />
</head>
<body>
  <header id="appHeader" class="app"></header>
  <main class="wrap">
    <div class="page-head">
      <h1 id="pgTitle"></h1>
      <p id="pgSub"></p>
    </div>
    <div class="filters" id="filters"></div>
    <div class="filters" id="fbHost"></div>
    <div class="panel">
      <div class="panel-body" style="padding:0">
        <div id="alertTable"></div>
      </div>
    </div>
    <div class="foot">Dabboos Sales Command Center · n8n + Odoo</div>
  </main>

  <script src="assets/js/config.js?v=13"></script>
  <script src="assets/js/common.js?v=13"></script>
  <script src="assets/js/order-modal.js?v=13"></script>
  <script>
  (function () {
    const D = window.DASH;
    D.buildChrome("alerts");
    document.getElementById("pgTitle").textContent = D.t("alerts_title");
    document.getElementById("pgSub").textContent = D.t("alerts_sub");

    let all = [];
    let ackMap = {};
    let filter = "all";
    const seen = new Set(JSON.parse(localStorage.getItem("seen_alerts") || "[]"));
    let firstLoad = true;

    document.getElementById("filters").innerHTML = `
      <span class="pill active" data-f="all">${D.t("filter_all")}</span>
      <span class="pill" data-f="critical">${D.t("filter_critical")}</span>
      <span class="pill" data-f="warning">${D.t("filter_warning")}</span>`;
    document.querySelectorAll(".pill").forEach(p => p.addEventListener("click", () => {
      filter = p.getAttribute("data-f");
      document.querySelectorAll(".pill").forEach(x => x.classList.toggle("active", x === p));
      render();
    }));
    const fb = D.filterBar(document.getElementById("fbHost"), { date: true, rep: true, customer: true }, render);

    function render() {
      const rows = all.filter(r =>
        (filter === "all" || r.level === filter) &&
        fb.match(r, { date: "date_order", rep: "salesperson", cust: "partner_name" }));
      fb.setCount(rows.length);
      document.getElementById("alertTable").innerHTML = rows.length ? `
        <table class="dt">
          <thead><tr>
            <th>${D.t("col_order")}</th><th>${D.t("col_customer")}</th>
            <th>${D.t("col_rep")}</th><th>${D.t("col_city")}</th>
            <th>${D.t("col_amount")}</th><th>${D.t("col_reasons")}</th>
            <th>${D.t("ack_status")}</th>
          </tr></thead>
          <tbody>
          ${rows.map(r => {
            const acks = ackMap[r.order_id] || [];
            const reviewed = acks.length > 0;
            const last = reviewed ? acks[0].created_at : null;
            return `<tr>
            <td><a class="order-link" data-order-id="${r.order_id}">${r.order_name || ("#" + r.order_id)}</a>
                <div>${r.level === "critical" ? `<span class="badge b-crit">${D.t("critical")}</span>` : `<span class="badge b-warn">${D.t("warning")}</span>`}</div></td>
            <td>${r.partner_name}</td>
            <td>${r.salesperson}</td>
            <td class="muted">${r.city}</td>
            <td class="amt">${D.fmtMoney(r.amount_total)}</td>
            <td><div class="reasons">${r.reasons.map(x => `<span class="r-${x.severity}">${x.severity === "critical" ? "🔴" : "🟡"} ${D.isAR() ? x.ar : x.en}</span>`).join("")}</div></td>
            <td>${reviewed
              ? `<span class="badge b-ok">${D.t("st_seen")}</span><div class="muted" style="margin-top:4px;font-size:12px">${D.t("ack_reviews")}: ${D.fmtNum(acks.length)} · ${D.fmtDate(last)} ${D.fmtTime(last)}</div>`
              : `<span class="badge b-warn">${D.t("st_ignored")}</span>`}</td>
          </tr>`;
          }).join("")}
          </tbody>
        </table>` : `<div class="empty">${D.t("no_alerts")}</div>`;
    }

    async function tick() {
      try {
        const [a, ak] = await Promise.all([D.api("alerts"), D.api("acks")]);
        D.setUpdated(a.generated_at);
        all = a.alerts;
        ackMap = {};
        (ak.acks || []).forEach(r => { (ackMap[r.order_id] = ackMap[r.order_id] || []).push(r); });
        fb.setReps(all.map(r => r.salesperson));
        render();
        const fresh = a.alerts.filter(r => !seen.has(r.order_id) && (r.level === "critical" || (D.cfg.SOUND_ON_WARNING && r.level === "warning")));
        a.alerts.forEach(r => seen.add(r.order_id));
        localStorage.setItem("seen_alerts", JSON.stringify([...seen].slice(-500)));
        if (!firstLoad && fresh.length) {
          D.beep();
          const f = fresh[0];
          D.toast(`<b>🚨 ${D.t("critical")} — ${f.order_name || ("#" + f.order_id)}</b>${f.partner_name} · ${D.fmtMoney(f.amount_total)}`, "critical");
          D.notify(D.t("alerts_title"), `${f.order_name || f.order_id} · ${f.partner_name}`);
        }
        firstLoad = false;
      } catch (e) {
        document.getElementById("alertTable").innerHTML = `<div class="err">${D.t("error_load")}</div>`;
      }
    }
    tick();
    setInterval(tick, D.cfg.POLL_MS);
  })();
  </script>
</body>
</html>
